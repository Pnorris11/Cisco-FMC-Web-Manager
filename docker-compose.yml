version: '3.8'

services:
  fmc-manager:
    build: .
    container_name: fmc-manager
    # Expose port 5004 to localhost only for Nginx Proxy Manager
    ports:
      - "127.0.0.1:5004:5004"
    environment:
      # Flask Configuration
      - PORT=5004

      # Application URL
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:5004}

      # SSL Configuration
      - SSL_VERIFY=${SSL_VERIFY:-False}

    env_file:
      - .env

    # Optional: Uncomment to mount logs directory for persistent logging
    # volumes:
    #   - ./logs:/app/logs

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      - fmc-network

networks:
  fmc-network:
    driver: bridge

